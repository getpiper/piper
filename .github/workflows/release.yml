name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force the tag that triggered the run. goreleaser otherwise resolves
          # the "current" tag via git describe, which is ambiguous when a final
          # release and its RC point at the same commit (v0.2.1 + v0.2.1-rc.2) —
          # it then rebuilt the RC and collided with its existing assets.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
