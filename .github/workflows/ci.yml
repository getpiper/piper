name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `verify` is a required status check, so the job must always run and
      # report — a path-filtered trigger would leave docs-only PRs forever
      # "pending" and unmergeable. Instead we gate the expensive Go steps on
      # whether code actually changed.
      - name: Detect code changes
        id: changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            code:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - '.goreleaser.yaml'
            docker:
              - 'Dockerfile'
              - '.dockerignore'
              - 'deploy/compose/**'
              - '.github/workflows/ci.yml'

      - uses: actions/setup-go@v5
        if: steps.changes.outputs.code == 'true'
        with:
          go-version: "1.26"

      - name: gofmt
        if: steps.changes.outputs.code == 'true'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        if: steps.changes.outputs.code == 'true'
        run: go vet ./...

      - name: test
        if: steps.changes.outputs.code == 'true'
        run: make test

      - name: cross-compile (no-cgo arm64)
        if: steps.changes.outputs.code == 'true'
        run: make cross

      - name: goreleaser check
        if: steps.changes.outputs.code == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Set up QEMU
        if: steps.changes.outputs.docker == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build piperd image (multi-arch, no push)
        if: steps.changes.outputs.docker == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
