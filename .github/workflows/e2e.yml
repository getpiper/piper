# Runs the e2e suite (test/e2e) against real Docker. Non-required check:
# unlike `verify` in ci.yml, a docs-only PR may skip this workflow entirely,
# so plain `paths:` trigger filtering is enough. See issue #128.
name: e2e

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "test/e2e/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "test/e2e/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    # A hung health-check loop would otherwise burn the 6-hour default.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # The runner user is non-root and the deploy test's embedded Caddy
      # binds :80.
      - name: Allow non-root bind to :80
        run: sudo sysctl -w net.ipv4.ip_unprivileged_port_start=80

      - name: e2e
        run: make e2e
