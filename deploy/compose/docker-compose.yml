services:
  piperd:
    build:
      context: ../..
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - piper_data:/var/lib/piper
    environment:
      - PIPER_DATA_DIR=/var/lib/piper
    env_file:
      - ../../packaging/systemd/piperd.env.example

volumes:
  piper_data:
